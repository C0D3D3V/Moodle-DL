name: Lint & Format

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: Ruff
    steps:
      - uses: actions/checkout@v4
      # Lint (replaces flake8 + isort + pylint).
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"
      # Format check (replaces black).
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
