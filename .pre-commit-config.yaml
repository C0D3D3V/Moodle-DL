# See https://pre-commit.com for more information.
# Install the hook with: `uv run pre-commit install`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      # Run the linter and autofix what can be fixed.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  # Regenerate the GUI translation catalogs (.ts/.qm) when GUI strings change.
  # Needs the Qt tools (e.g. `pip install PySide6`); if absent it warns and skips.
  - repo: local
    hooks:
      - id: update-translations
        name: Update GUI translation catalogs
        entry: python scripts/update_translations.py
        language: system
        pass_filenames: false
        files: ^moodle_dl/gui/.*\.py$|^moodle_dl/gui/i18n/.*\.(ts|py)$
